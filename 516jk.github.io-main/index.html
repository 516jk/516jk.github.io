<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无限画布交互</title>
    <style>
        /* 1. 基础设置：隐藏滚动条，禁止默认滚动 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 关键：隐藏滚动条，由JS接管移动 */
            background-color: #111;
            font-family: "Microsoft YaHei", sans-serif;
            cursor: grab; /* 鼠标变成抓取手势 */
        }

        body:active {
            cursor: grabbing; /* 按住时变成抓取中手势 */
        }

        /* 2. 世界容器：包含所有内容，负责变换位置 */
        #world {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0; /* 变换原点设为左上角，方便计算 */
            will-change: transform; /* 性能优化 */
        }

        /* 3. 导航栏：固定在视口最上层，不随画布移动 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 9999; /* 保证在最上层 */
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav {
            display: flex;
            list-style: none;
            gap: 60px;
        }

        .nav li a {
            text-decoration: none;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        .nav li a:hover { color: #ff4d4d; }

        /* 4. 内容区域：作为画布的一部分 */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 150px; /* 给导航栏留空 */
            padding-bottom: 500px; /* 下方留白，模拟无限高度 */
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .banner img {
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            pointer-events: none; /* 防止图片拖拽干扰画布拖拽 */
            user-select: none;
        }

        .text-box {
            color: white;
            margin-top: 50px;
            text-align: center;
            font-size: 18px;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <!-- 导航栏 (固定不动) -->
    <header>
        <ul class="nav">
            <li><a href="zuixing.html">罪行</a></li>
            <li><a href="index.html">首页</a></li>
            <li><a href="renwu.html">人物介绍</a></li>
        </ul>
    </header>

    <!-- 可移动的世界容器 -->
    <div id="world">
        <div class="content-wrapper">
            <div class="banner">
                <img src="img/01.jpg" alt="Banner">
            </div>
            <div class="text-box">
                <p>试着按住鼠标拖动，或者滚动滚轮缩放。</p>
            </div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        
        // 状态变量
        let state = {
            x: 0,             // 当前X位置
            y: 0,             // 当前Y位置
            scale: 1,         // 当前缩放比例
            isDragging: false,// 是否正在拖拽
            startX: 0,        // 鼠标按下时的X坐标
            startY: 0,        // 鼠标按下时的Y坐标
            startTransformX: 0, // 拖拽开始时的Transform X
            startTransformY: 0  // 拖拽开始时的Transform Y
        };

        // 1. 鼠标按下 - 开始拖拽
        document.addEventListener('mousedown', (e) => {
            state.isDragging = true;
            state.startX = e.clientX;
            state.startY = e.clientY;
            state.startTransformX = state.x;
            state.startTransformY = state.y;
            world.style.cursor = 'grabbing';
        });

        // 2. 鼠标移动 - 执行拖拽
        document.addEventListener('mousemove', (e) => {
            if (!state.isDragging) return;

            // 计算鼠标移动的距离
            const deltaX = e.clientX - state.startX;
            const deltaY = e.clientY - state.startY;

            // 更新位置
            state.x = state.startTransformX + deltaX;
            state.y = state.startTransformY + deltaY;

            updateTransform();
        });

        // 3. 鼠标抬起/离开 - 结束拖拽
        document.addEventListener('mouseup', () => {
            state.isDragging = false;
            world.style.cursor = 'grab';
        });

        // 4. 滚轮事件 - 缩放
        document.addEventListener('wheel', (e) => {
            e.preventDefault(); // 阻止默认滚动

            const zoomIntensity = 0.1; // 缩放灵敏度
            const direction = e.deltaY > 0 ? -1 : 1; // 向下滚是-1，向上滚是1
            
            // 计算新的缩放比例 (限制最小0.5，最大3)
            let newScale = state.scale + (direction * zoomIntensity * state.scale);
            newScale = Math.min(Math.max(0.5, newScale), 3);

            // 核心算法：以鼠标位置为中心进行缩放
            // 我们需要计算鼠标在“世界”坐标系中的位置
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // 计算缩放前后，鼠标对应点在画面中的偏移量
            // 公式推导：新位置 = 旧位置 - (鼠标位置 - 旧位置) * (缩放变化率)
            // 这里简化处理，直接调整 x, y 使得鼠标下的点保持相对静止
            
            // 获取当前的变换矩阵信息（如果浏览器支持）或直接计算
            // 简单算法：
            const scaleRatio = newScale / state.scale;
            
            state.x = mouseX - (mouseX - state.x) * scaleRatio;
            state.y = mouseY - (mouseY - state.y) * scaleRatio;
            
            state.scale = newScale;

            updateTransform();
        }, { passive: false });

        // 更新CSS变换
        function updateTransform() {
            world.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
        }
    </script>
</body>
</html>
