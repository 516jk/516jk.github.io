<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>选择分类</title>
		<style>
			/* 简单的样式美化 */
			table {
				border-collapse: collapse;
				width: 300px;
				margin: 20px;
			}
			td {
				border: 1px solid #ccc;
				padding: 10px;
				font-family: sans-serif;
			}
			.header {
				background-color: #f2f2f2;
				font-weight: bold;
			}
		</style>
	</head>
	<body>

		<table>
			<!-- 表头 -->
			<tr>
				<td class="header" colspan="2">偏好设置</td>
			</tr>
			<!-- 内容行 -->
			<tr>
				<td>喜欢男大黑皮体育生</td>
				<td>
					<!-- 选项区域 -->
					<label><input type="radio" name="category" value="1"> 第一类</label>
					<label><input type="radio" name="category" value="2"> 第二类</label>
					<label><input type="radio" name="category" value="3"> 第三类</label>
				</td>
			</tr>
		</table>

	</body>
</html>
